# BLINKS Backend Default Configuration
environment = "development"

[database]
url = "postgres://localhost/BLINKS"
max_pool_size = 16

[server]
port = 3000

[jwt]
secret = "change-this-in-production"
expiration_hours = 24
refresh_expiration_hours = 168

[stellar]
network_id = "Test SDF Network ; September 2015"
passphrase = "Test SDF Network ; September 2015"
horizon_url = "https://horizon-testnet.stellar.org"
rpc_url = "https://soroban-testnet.stellar.org"

[anchor]
sep24_url = "https://anchor.example.com/sep24"
sep31_url = "https://anchor.example.com/sep31"
webhook_secret = "webhook-secret"
kyc_required = true

[bridge]
ethereum_rpc_url = "https://mainnet.infura.io/v3/YOUR_PROJECT_ID"
polygon_rpc_url = "https://polygon-rpc.com"
bsc_rpc_url = "https://bsc-dataseed.binance.org"
supported_assets = ["USDC", "USDT"]
min_bridge_amount = 1000000  # 1 USD in cents
max_bridge_amount = 100000000  # 1000 USD in cents

[compliance]
sanctions_api_url = "https://api.sanctions.example.com"
sanctions_api_key = "api-key"
alert_webhook_url = ""

[compliance.velocity_limits]
daily_transaction_limit = 10000000  # 10,000 USD
monthly_transaction_limit = 100000000  # 100,000 USD
max_transaction_amount = 5000000  # 5,000 USD

[compliance.risk_thresholds]
high_risk_amount = 10000000  # 10,000 USD
medium_risk_amount = 1000000  # 1,000 USD
suspicious_patterns = []

[rate_limit]
window_ms = 60000 # 1 minute
max_requests = 100
scope = "IP"
bypass_admin = true

[[rate_limit.endpoint_limits]]
path_prefix = "/auth"
window_ms = 60000
max_requests = 20

[[rate_limit.endpoint_limits]]
path_prefix = "/payments"
window_ms = 60000
max_requests = 60

[observability]
service_name = "blinks-backend"
sentry_dsn = ""
alert_webhook_url = ""
log_retention_days = 30

[cache]
redis_url = "redis://localhost:6379"
default_ttl_seconds = 300
hot_data_ttl_seconds = 60

[queue]
redis_url = "redis://localhost:6379"
max_retries = 3
visibility_timeout_seconds = 300
backoff_multiplier = 2.0
max_backoff_seconds = 3600
dead_letter_max_size = 10000
worker_count = 4
reclaim_interval_seconds = 60
